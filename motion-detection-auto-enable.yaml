# HA automation: auto-enable Motion Detection after 4 hours of being off.
#
# How to add to Home Assistant:
#
#   Option A (recommended) — paste this file content into
#   your automations.yaml, then reload automations:
#   Developer Tools → YAML → Automations → Reload.
#
#   Option B — UI import: Settings → Automations & Scenes → Create Automation →
#   three-dot menu (top right) → Edit in YAML → paste the content below
#   (excluding this comment block) → Save.
#
# The entity_id switch.motion_detection matches the ESPHome switch named
# "Motion Detection" on device esp32-c3-light. Adjust if HA assigned a
# different suffix (check Settings → Devices & Services → ESPHome device).

- alias: "Motion Detection: auto-enable after 4 hours"
  description: "Re-enables motion detection if left off for 4 hours."
  trigger:
    - platform: state
      entity_id: switch.motion_detection
      to: "off"
      for:
        hours: 4
  action:
    - action: switch.turn_on
      target:
        entity_id: switch.motion_detection
  mode: single
