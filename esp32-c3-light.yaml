esphome:
  name: esp32-c3-light
  friendly_name: Motion Light

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "esp32-c3-light Fallback"
    password: "fallback123"

logger:
  hardware_uart: USB_SERIAL_JTAG

ota:
  platform: esphome

api:

web_server:
  port: 80
  version: 3

debug:
  update_interval: 5s

# GPIO2: strapping pin on ESP32-C3 (internal pullup keeps it HIGH at boot).
# Driving transistor base from here causes a brief LED-on at power-up — fine
# for a strip. Rewire to GPIO5/GPIO6 if the flash at boot is unacceptable.
output:
  - platform: ledc
    pin: GPIO2
    id: out_led_strip
    frequency: 1000Hz

# g_scripting: true while the script is issuing a light call, preventing
# on_turn_on / on_turn_off from recursively restarting or stopping light_timer.
# g_motion_blocked: true for 30 s after HA manually turns off the light.
globals:
  - id: g_scripting
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_motion_blocked
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_dim_brightness
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_dim_step
    type: float
    restore_value: no
    initial_value: '0.0'

number:
  - platform: template
    name: "Target Brightness"
    id: target_brightness
    min_value: 10
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true
    initial_value: 80
    on_value:
      then:
        - if:
            condition:
              light.is_on: motion_light
            then:
              - script.execute: light_timer

  - platform: template
    name: "Timer Duration"
    id: timer_duration
    min_value: 1
    max_value: 60
    step: 1
    unit_of_measurement: "min"
    optimistic: true
    restore_value: true
    initial_value: 30

  - platform: template
    name: "Motion Block Duration"
    id: motion_block_duration
    min_value: 0
    max_value: 60
    step: 1
    unit_of_measurement: "min"
    optimistic: true
    restore_value: true
    initial_value: 1

  - platform: template
    name: "Fade In Time"
    id: fade_in_time
    min_value: 1
    max_value: 10
    step: 1
    unit_of_measurement: "s"
    optimistic: true
    restore_value: true
    initial_value: 2

  - platform: template
    name: "Dim Floor"
    id: dim_floor
    min_value: 1
    max_value: 50
    step: 1
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true
    initial_value: 10

switch:
  - platform: template
    name: "Motion Detection"
    id: motion_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

light:
  - platform: monochromatic
    name: "Motion Light"
    id: motion_light
    output: out_led_strip
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - if:
            condition:
              lambda: 'return !id(g_scripting);'
            then:
              - script.execute: light_timer
    on_turn_off:
      then:
        - if:
            condition:
              lambda: 'return !id(g_scripting);'
            then:
              - script.stop: light_timer
              - script.execute: motion_block_timer

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      mode:
        input: true
    name: "PIR Motion"
    device_class: motion
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - if:
            condition:
              and:
                - switch.is_on: motion_enabled
                - lambda: 'return !id(g_motion_blocked);'
            then:
              - script.execute: light_timer

sensor:
  - platform: uptime
    name: "Uptime"
    update_interval: 5s
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 10s
  - platform: debug
    free:
      name: "Heap Free"
    block:
      name: "Heap Max Block"
    loop_time:
      name: "Loop Time"

text_sensor:
  - platform: debug
    device:
      name: "Device Info"
    reset_reason:
      name: "Reset Reason"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "SSID"

script:
  - id: motion_block_timer
    mode: restart
    then:
      - lambda: 'id(g_motion_blocked) = true;'
      - delay: !lambda 'return (uint32_t)(id(motion_block_duration).state * 60000);'
      - lambda: 'id(g_motion_blocked) = false;'

  - id: light_timer
    mode: restart
    then:
      # 1. Fade in to configured brightness over 2 seconds.
      - lambda: 'id(g_scripting) = true;'
      - light.turn_on:
          id: motion_light
          brightness: !lambda 'return id(target_brightness).state / 100.0f;'
          transition_length: !lambda 'return (uint32_t)(id(fade_in_time).state * 1000);'
      - lambda: 'id(g_scripting) = false;'
      # 2. Wait for the fade-in to finish.
      - delay: !lambda 'return (uint32_t)(id(fade_in_time).state * 1000);'
      # 3. Calculate per-step decrement: total steps = timer_duration*60s / 10s per step.
      - lambda: |-
          id(g_dim_brightness) = id(target_brightness).state / 100.0f;
          float steps = (id(timer_duration).state * 60.0f) / 10.0f;
          float floor_val = id(dim_floor).state / 100.0f;
          float range = id(g_dim_brightness) - floor_val;
          id(g_dim_step) = (steps > 0.0f) ? (range / steps) : 0.0f;
      # 4. Step-based dim loop — 10 s per step so HA always shows the current level.
      - while:
          condition:
            lambda: 'return id(g_dim_brightness) > id(dim_floor).state / 100.0f;'
          then:
            - lambda: |-
                float floor_val = id(dim_floor).state / 100.0f;
                id(g_dim_brightness) -= id(g_dim_step);
                if (id(g_dim_brightness) < floor_val) id(g_dim_brightness) = floor_val;
            - lambda: 'id(g_scripting) = true;'
            - light.turn_on:
                id: motion_light
                brightness: !lambda 'return id(g_dim_brightness);'
                transition_length: 10s
            - lambda: 'id(g_scripting) = false;'
            - delay: 10s
      # 5. Quick final fade to off (~1 second).
      - lambda: 'id(g_scripting) = true;'
      - light.turn_off:
          id: motion_light
          transition_length: 1s
      - lambda: 'id(g_scripting) = false;'
